<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>
<link rel="stylesheet" href="forgot_pass.css">
<!-- Font Awesome Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="shortcut icon" href="logo.png" type="image/x-icon">



</head>
<body>

    <div class="bg-overlay"></div>

    <div class="forgot-container">
        <div class="form-box">
            <h2>Forgot Password</h2>
            <p class="subtitle" style="font-size: 0.9rem; margin-bottom: 25px;">Enter your email or phone number to reset your password.</p>

            <form action="#">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="text" placeholder="Email or Phone Number" required>
                </div>

                <button type="submit" class="forgot-btn">Send Reset Link</button>

                <div class="switch">
                    <a href="adminlog.html">← Back to Login</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
